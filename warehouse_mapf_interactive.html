<!doctype html>
<html lang="en"> 
<head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Warehouse MAPF Interactive Viewer</title>
        <style>
                :root {
                        --bg: #f8f4ea;
                        --panel: #fffef8;
                        --ink: #1f2937;
                        --accent: #0f766e;
                        --grid: #d1d5db;
                        --shelf: #8b6914;
                }
                body {
                        margin: 0;
                        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
                        background: radial-gradient(circle at 10% 10%, #fff6e1 0%, var(--bg) 45%, #efe8d5 100%);
                        color: var(--ink);
                }
                .wrap {
                        max-width: 1100px;
                        margin: 1.2rem auto;
                        padding: 0 1rem;
                        display: grid;
                        gap: 0.9rem;
                        grid-template-columns: 1fr;
                }
                .panel {
                        background: var(--panel);
                        border: 1px solid #d6d3d1;
                        border-radius: 14px;
                        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
                        padding: 0.8rem;
                }
                .topbar {
                        display: flex;
                        gap: 0.8rem;
                        align-items: center;
                        justify-content: space-between;
                        flex-wrap: wrap;
                }
                .title {
                        margin: 0;
                        font-size: 1.1rem;
                        letter-spacing: 0.2px;
                }
                .topbar-controls {
                        display: flex;
                        align-items: center;
                        gap: 0.6rem;
                        font-size: 0.9rem;
                }
                select {
                        border: 1px solid #0f766e;
                        background: #f0fdfa;
                        color: #134e4a;
                        border-radius: 8px;
                        padding: 0.35rem 0.45rem;
                        font-weight: 700;
                        cursor: pointer;
                }
                canvas {
                        width: 100%;
                        height: auto;
                        border-radius: 10px;
                        border: 1px solid #d1d5db;
                        background: #f3f4f6;
                        display: block;
                }
                .controls {
                        display: grid;
                        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
                        gap: 0.5rem;
                        align-items: center;
                        margin-top: 0.8rem;
                }
                button {
                        border: 1px solid #0f766e;
                        background: #f0fdfa;
                        color: #134e4a;
                        border-radius: 8px;
                        padding: 0.5rem 0.6rem;
                        font-weight: 700;
                        cursor: pointer;
                }
                button:hover { filter: brightness(0.98); }
                input[type="range"] {
                        width: 100%;
                        accent-color: var(--accent);
                }
                .legend {
                        display: grid;
                        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                        gap: 0.35rem 0.75rem;
                        margin-top: 0.5rem;
                        font-size: 0.85rem;
                }
                .legend-item {
                        display: flex;
                        align-items: center;
                        gap: 0.4rem;
                        white-space: nowrap;
                        overflow: hidden;
                        text-overflow: ellipsis;
                }
                .swatch {
                        width: 12px;
                        height: 12px;
                        border-radius: 50%;
                        border: 1px solid #111827;
                        flex-shrink: 0;
                }
                .stat {
                        font-variant-numeric: tabular-nums;
                        font-size: 0.9rem;
                }
        </style>
</head>

, [16, 12], [16, 12], [16, 12]]], "robots": [{"id": 0, "start": [13, 16], "goal": [7, 18], "path_length": 23, "color": "#0ea5e9"}, {"id": 1, "start": [15, 18], "goal": [2, 8], "path_length": 41, "color": "#ef4444"}, {"id": 2, "start": [16, 17], "goal": [14, 4], "path_length": 32, "color": "#22c55e"}, {"id": 3, "start": [12, 6], "goal": [13, 7], "path_length": 10, "color": "#f59e0b"}, {"id": 4, "start": [12, 10], "goal": [10, 9], "path_length": 19, "color": "#8b5cf6"}, {"id": 5, "start": [16, 10], "goal": [11, 9], "path_length": 50, "color": "#ec4899"}, {"id": 6, "start": [17, 16], "goal": [1, 18], "path_length": 59, "color": "#14b8a6"}, {"id": 7, "start": [12, 7], "goal": [4, 12], "path_length": 68, "color": "#eab308"}, {"id": 8, "start": [13, 8], "goal": [5, 1], "path_length": 77, "color": "#f97316"}, {"id": 9, "start": [17, 14], "goal": [11, 12], "path_length": 86, "color": "#84cc16"}], "title": "Warehouse MAPF - 10 Agents (Interactive)"}};

                                ctx.stroke();

                                const [gr, gc] = robot.goal;

                                ctx.fillStyle = robot.color + "99";
                                ctx.strokeStyle = "#111827";
                                ctx.lineWidth = 1;
                                ctx.fillRect(sc * cell + cell * 0.2, sr * cell + cell * 0.2, cell * 0.6, cell * 0.6);
                                ctx.strokeRect(sc * cell + cell * 0.2, sr * cell + cell * 0.2, cell * 0.6, cell * 0.6);

                                starPath(gc * cell + cell * 0.5, gr * cell + cell * 0.5, cell * 0.24, cell * 0.11, 5);

                                ctx.globalAlpha = 0.75;
                                ctx.fill();
                                ctx.globalAlpha = 1.0;
                                ctx.stroke();
                        }

                        const positions = data.frames[frame];
                        for (let i = 0; i < data.robots.length; i++) {
                                const robot = data.robots[i];
                                const [rr, rc] = positions[i];
                                const cx = rc * cell + cell * 0.5;
                                const cy = rr * cell + cell * 0.5;

                                ctx.beginPath();
                                ctx.arc(cx, cy, cell * 0.32, 0, Math.PI * 2);
                                ctx.fillStyle = robot.color;
                                ctx.strokeStyle = "#111827";
                                ctx.lineWidth = 1.5;
                                ctx.fill();
                                ctx.stroke();

                                ctx.fillStyle = "#ffffff";
                                ctx.font = `bold ${Math.max(11, Math.floor(cell * 0.3))}px sans-serif`;
                                ctx.textAlign = "center";
                                ctx.textBaseline = "middle";
                                ctx.fillText(String(robot.id), cx, cy);
                        }

                        frameLabelEl.textContent = `t = ${frame} / ${data.frames.length - 1}`;
                        frameSlider.value = String(frame);
                }

                function tick() {
                        if (!playing) return;
                        frame = (frame + 1) % data.frames.length;
                        draw();

                function restartTimer() {
                        if (timer) clearInterval(timer);
                        timer = setInterval(tick, Math.max(30, Math.floor(1000 / fps)));
                }

                scenarioSelect.addEventListener("change", () => {
                        setScenario(Number(scenarioSelect.value));
                });

                playPauseBtn.addEventListener("click", () => {
                        playing = !playing;
                        playPauseBtn.textContent = playing ? "Pause" : "Play";
                });

                prevBtn.addEventListener("click", () => {
                        frame = (frame - 1 + data.frames.length) % data.frames.length;
                        draw();
                });

                nextBtn.addEventListener("click", () => {
                        frame = (frame + 1) % data.frames.length;
                        draw();
                });

                resetBtn.addEventListener("click", () => {
                        frame = 0;
                        draw();
                });

                fpsSlider.addEventListener("input", () => {
                        fps = Number(fpsSlider.value);
                        restartTimer();
                });

                frameSlider.addEventListener("input", () => {
                        frame = Number(frameSlider.value);
                        draw();
                });

                scenarioSelect.value = String(scenarioKeys[0]);
                setScenario(scenarioKeys[0]);
